name: Simplified Continuous Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '18.x'
  AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  AZURE_RESOURCE_GROUP: 'rg-member-property-alert-dev'
  AZURE_LOCATION: 'eastus'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'src/MemberPropertyAlert.UI/package.json'
      
      - name: Restore .NET dependencies
        run: dotnet restore MemberPropertyMarketAlert.sln
      
      - name: Build .NET solution
        run: dotnet build MemberPropertyMarketAlert.sln --no-restore --configuration Release
      
      - name: Run .NET tests
        run: dotnet test MemberPropertyMarketAlert.sln --no-build --configuration Release --verbosity normal
      
      - name: Install UI dependencies
        working-directory: src/MemberPropertyAlert.UI
        run: npm install
      
      - name: Build React UI
        working-directory: src/MemberPropertyAlert.UI
        run: npm run build
      
      - name: Publish Azure Functions
        run: |
          dotnet publish src/MemberPropertyAlert.Functions/MemberPropertyAlert.Functions.csproj \
            --configuration Release \
            --output ./publish/functions \
            --no-restore \
            --no-build
      
      - name: Upload Functions artifact
        uses: actions/upload-artifact@v4
        with:
          name: azure-functions
          path: ./publish/functions
          retention-days: 1
      
      - name: Upload UI artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-ui
          path: src/MemberPropertyAlert.UI/build
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      
      - name: Deploy Infrastructure
        run: |
          echo "Creating resource group..."
          az group create --name ${{ env.AZURE_RESOURCE_GROUP }} --location ${{ env.AZURE_LOCATION }}
          
          echo "Deploying Bicep template..."
          az deployment group create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters @infra/main.dev.parameters.json \
            --parameters location=${{ env.AZURE_LOCATION }} \
            --verbose
      
      - name: Get Resource Names
        id: resources
        run: |
          FUNCTION_APP=$(az functionapp list --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query "[0].name" -o tsv)
          STATIC_WEB_APP=$(az staticwebapp list --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query "[0].name" -o tsv)
          
          echo "functionAppName=$FUNCTION_APP" >> $GITHUB_OUTPUT
          echo "staticWebAppName=$STATIC_WEB_APP" >> $GITHUB_OUTPUT
          
          echo "Found Function App: $FUNCTION_APP"
          echo "Found Static Web App: $STATIC_WEB_APP"
      
      - name: Download Functions artifact
        uses: actions/download-artifact@v4
        with:
          name: azure-functions
          path: ./functions
      
      - name: Deploy Azure Functions
        uses: azure/functions-action@v1
        with:
          app-name: ${{ steps.resources.outputs.functionAppName }}
          package: ./functions
      
      - name: Get Static Web App Token
        id: swa-token
        run: |
          SWA_TOKEN=$(az staticwebapp secrets list \
            --name ${{ steps.resources.outputs.staticWebAppName }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.apiKey" -o tsv)
          echo "token=$SWA_TOKEN" >> $GITHUB_OUTPUT
      
      - name: Download UI artifact
        uses: actions/download-artifact@v4
        with:
          name: react-ui
          path: ./ui
      
      - name: Deploy Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./ui"
          skip_app_build: true
