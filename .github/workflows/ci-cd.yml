name: Enhanced Continuous Deployment

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  checks: read

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '18.x'
  # Azure configuration - NO SECRETS, environment-based configuration
  AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  AZURE_RESOURCE_GROUP: 'rg-member-property-alert-dev'
  AZURE_LOCATION: 'eastus'

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      infra-changed: ${{ steps.changes.outputs.infra-changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need previous commit for change detection
      
      - name: Detect infrastructure changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "infra-changed=true" >> $GITHUB_OUTPUT
            echo "Manual deployment triggered - deploying infrastructure"
          else
            INFRA_CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E '^infra/' | wc -l)
            if [ "$INFRA_CHANGED" -gt 0 ]; then
              echo "infra-changed=true" >> $GITHUB_OUTPUT
              echo "Infrastructure changes detected - will deploy"
            else
              echo "infra-changed=false" >> $GITHUB_OUTPUT
              echo "No infrastructure changes - skipping infrastructure deployment"
            fi
          fi
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'src/MemberPropertyAlert.UI/package.json'
      
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      
      - name: Restore .NET dependencies
        run: dotnet restore MemberPropertyMarketAlert.sln
      
      - name: Build .NET solution
        run: dotnet build MemberPropertyMarketAlert.sln --no-restore --configuration Release
      
      - name: Run .NET tests
        run: dotnet test MemberPropertyMarketAlert.sln --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage"
      
      - name: Check code formatting
        run: dotnet format MemberPropertyMarketAlert.sln --verify-no-changes --verbosity diagnostic
      
      - name: Install UI dependencies
        working-directory: src/MemberPropertyAlert.UI
        run: npm install
      
      - name: Build React UI
        working-directory: src/MemberPropertyAlert.UI
        run: npm run build
      
      - name: Publish Azure Functions
        run: |
          dotnet publish src/MemberPropertyAlert.Functions/MemberPropertyAlert.Functions.csproj \
            --configuration Release \
            --output ./publish/functions \
            --no-restore \
            --no-build
      
      - name: Publish Mock Webhook Client
        run: |
          dotnet publish src/MemberPropertyAlert.MockWebhookClient/MemberPropertyAlert.MockWebhookClient.csproj \
            --configuration Release \
            --output ./publish/webhook-client \
            --no-restore \
            --no-build
      
      - name: Upload Functions artifact
        uses: actions/upload-artifact@v4
        with:
          name: azure-functions
          path: ./publish/functions
          retention-days: 1
      
      - name: Upload UI artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-ui
          path: src/MemberPropertyAlert.UI/build
          retention-days: 1
      
      - name: Upload Mock Webhook Client artifact
        uses: actions/upload-artifact@v4
        with:
          name: mock-webhook-client
          path: ./publish/webhook-client
          retention-days: 1
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/TestResults/**/*'
          retention-days: 7

  deploy-and-configure:
    runs-on: ubuntu-latest
    needs: [test-and-build]
    if: always() && needs.test-and-build.result == 'success'
    outputs:
      function-app-name: ${{ steps.get-app-name.outputs.functionAppName }}
      static-web-app-name: ${{ steps.get-app-name.outputs.staticWebAppName }}
      deployment-successful: ${{ steps.final-status.outputs.success }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Azure Login (OIDC) - Single login for all Azure operations
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      
      - name: Deploy infrastructure (if needed)
        id: deploy-infra
        if: needs.test-and-build.outputs.infra-changed == 'true'
        shell: bash
        run: |
          RG="${{ env.AZURE_RESOURCE_GROUP }}"
          LOC="${{ env.AZURE_LOCATION }}"
          echo "Deploying infrastructure..."
          az group create --name "$RG" --location "$LOC"          DEPLOY_JSON=$(az deployment group create \
            --resource-group "$RG" \
            --template-file infra/main.bicep \
            --parameters @infra/main.dev.parameters.json \
            --parameters location="$LOC" \
            --output json)
          FUNCTION_APP_NAME=$(jq -r '.properties.outputs.functionAppName.value' <<<"$DEPLOY_JSON")
          STATIC_WEB_APP_NAME=$(jq -r '.properties.outputs.staticWebAppName.value' <<<"$DEPLOY_JSON")
          echo "functionAppName=$FUNCTION_APP_NAME" >> "$GITHUB_OUTPUT"
          echo "staticWebAppName=$STATIC_WEB_APP_NAME" >> "$GITHUB_OUTPUT"
          echo "Infrastructure deployment completed: Functions=$FUNCTION_APP_NAME, StaticWeb=$STATIC_WEB_APP_NAME"
      
      - name: Get existing resource names
        id: get-existing
        if: needs.test-and-build.outputs.infra-changed == 'false'
        shell: bash
        run: |
          RG="${{ env.AZURE_RESOURCE_GROUP }}"
          echo "Looking for existing resources in resource group: $RG"
            FUNCTION_APP_NAME=$(az functionapp list --resource-group "$RG" --query "[0].name" -o tsv 2>/dev/null || echo "")
          STATIC_WEB_APP_NAME=$(az staticwebapp list --resource-group "$RG" --query "[0].name" -o tsv 2>/dev/null || echo "")
          
          if [ -z "$FUNCTION_APP_NAME" ] || [ "$FUNCTION_APP_NAME" = "null" ] || [ -z "$STATIC_WEB_APP_NAME" ] || [ "$STATIC_WEB_APP_NAME" = "null" ]; then
            echo "ERROR: Missing resources in resource group $RG"
            echo "RETRY: Forcing infrastructure deployment..."
            az group create --name "$RG" --location "${{ env.AZURE_LOCATION }}"
            DEPLOY_JSON=$(az deployment group create \
              --resource-group "$RG" \
              --template-file infra/main.bicep \
              --parameters @infra/main.dev.parameters.json \
              --parameters location="${{ env.AZURE_LOCATION }}" \
              --output json)
            FUNCTION_APP_NAME=$(jq -r '.properties.outputs.functionAppName.value' <<<"$DEPLOY_JSON")
            STATIC_WEB_APP_NAME=$(jq -r '.properties.outputs.staticWebAppName.value' <<<"$DEPLOY_JSON")
            echo "SUCCESS: Infrastructure deployed due to missing resources"
          fi
          
          echo "functionAppName=$FUNCTION_APP_NAME" >> "$GITHUB_OUTPUT"
          echo "staticWebAppName=$STATIC_WEB_APP_NAME" >> "$GITHUB_OUTPUT"
          echo "SUCCESS: Resources found/created: Functions=$FUNCTION_APP_NAME, StaticWeb=$STATIC_WEB_APP_NAME"
      
      - name: Determine resource names
        id: get-app-name
        shell: bash
        run: |
          if [ "${{ needs.test-and-build.outputs.infra-changed }}" == "true" ]; then
            FUNCTION_APP_NAME="${{ steps.deploy-infra.outputs.functionAppName }}"
            STATIC_WEB_APP_NAME="${{ steps.deploy-infra.outputs.staticWebAppName }}"
          else
            FUNCTION_APP_NAME="${{ steps.get-existing.outputs.functionAppName }}"
            STATIC_WEB_APP_NAME="${{ steps.get-existing.outputs.staticWebAppName }}"
          fi
          echo "functionAppName=$FUNCTION_APP_NAME" >> "$GITHUB_OUTPUT"
          echo "staticWebAppName=$STATIC_WEB_APP_NAME" >> "$GITHUB_OUTPUT"
          echo "APP: Using Function App: $FUNCTION_APP_NAME"
          echo "WEB: Using Static Web App: $STATIC_WEB_APP_NAME"
      
      - name: Download Functions artifact
        uses: actions/download-artifact@v4
        with:
          name: azure-functions
          path: ./functions
      
      - name: Download UI artifact
        uses: actions/download-artifact@v4
        with:
          name: react-ui
          path: ./ui
      
      - name: Deploy Azure Functions
        uses: azure/functions-action@v1
        with:
          app-name: ${{ steps.get-app-name.outputs.functionAppName }}
          package: ./functions
      
      - name: Deploy Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./ui"
          skip_app_build: true
      
      - name: Configure application settings
        shell: bash
        run: |
          echo "SUCCESS: Applications configured via Bicep infrastructure - no additional settings needed"
      
      - name: Set final status
        id: final-status
        shell: bash
        run: |
          echo "success=true" >> "$GITHUB_OUTPUT"
          echo "COMPLETE: Deployment and configuration completed successfully"

  test-and-notify:
    runs-on: ubuntu-latest
    needs: [test-and-build, deploy-and-configure]
    if: always() && needs.deploy-and-configure.result == 'success'
    steps:
      - name: Download Mock Webhook Client artifact
        uses: actions/download-artifact@v4
        with:
          name: mock-webhook-client
          path: ./webhook-client
      
      - name: Setup .NET for integration tests
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Start Mock Webhook Client for testing
        shell: bash
        run: |
          cd webhook-client
          dotnet MemberPropertyAlert.MockWebhookClient.dll --urls "http://localhost:5000" &
          echo $! > webhook_client.pid
          echo "STARTED: Mock Webhook Client started on port 5000"
          sleep 10
      
      - name: Optimized health check (no unnecessary sleep)
        shell: bash
        run: |
          FUNCTION_APP_NAME="${{ needs.deploy-and-configure.outputs.function-app-name }}"
          STATIC_WEB_APP_NAME="${{ needs.deploy-and-configure.outputs.static-web-app-name }}"
          FUNCTION_URL="https://$FUNCTION_APP_NAME.azurewebsites.net"
          STATIC_URL="https://$STATIC_WEB_APP_NAME.azurestaticapps.net"
          
          echo "TESTING: Testing applications:"
          echo "   Functions: $FUNCTION_URL"
          echo "   Static Web App: $STATIC_URL"
          echo "   Mock Webhook: http://localhost:5000"
          
          # Test Mock Webhook Client first (local)
          echo "Testing Mock Webhook Client..."
          for i in {1..3}; do
            MOCK_STATUS=$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:5000/health" || echo "000")
            if [[ "$MOCK_STATUS" == 200 ]]; then
              echo "SUCCESS: Mock Webhook Client responding: $MOCK_STATUS"
              break
            fi
            if [[ $i -eq 3 ]]; then
              echo "ERROR: Mock Webhook Client failed to respond"
              exit 1
            fi
            sleep 5
          done
          
          # Test Azure Functions
          echo "Testing Azure Functions..."
          for i in {1..6}; do
            echo "Health check attempt $i/6 for Functions..."
            
            HEALTH_STATUS=$(curl -s -L -o /dev/null -w '%{http_code}' "$FUNCTION_URL/api/health" || echo "000")
            if [[ "$HEALTH_STATUS" == 200 ]]; then
              echo "SUCCESS: Functions health endpoint responding: $HEALTH_STATUS"
              break
            fi
            
            # Test main functions endpoint
            MAIN_STATUS=$(curl -s -L -o /dev/null -w '%{http_code}' "$FUNCTION_URL" || echo "000")
            if [[ "$MAIN_STATUS" == 200 || "$MAIN_STATUS" == 404 || "$MAIN_STATUS" == 401 ]]; then
              echo "SUCCESS: Functions app responding: $MAIN_STATUS"
              break
            fi
            
            if [[ $i -eq 6 ]]; then
              echo "ERROR: Functions app failed to respond after 6 attempts"
              echo "   Health: $HEALTH_STATUS, Main: $MAIN_STATUS"
              exit 1
            fi
            
            echo "Waiting 10 seconds before retry..."
            sleep 10
          done
          
          # Test Static Web App
          echo "Testing Static Web App..."
          for i in {1..6}; do
            echo "Health check attempt $i/6 for Static Web App..."
            
            STATIC_STATUS=$(curl -s -L -o /dev/null -w '%{http_code}' "$STATIC_URL" || echo "000")
            if [[ "$STATIC_STATUS" == 200 || "$STATIC_STATUS" == 301 || "$STATIC_STATUS" == 302 ]]; then
              echo "SUCCESS: Static Web App responding: $STATIC_STATUS"
              break
            fi
            
            if [[ $i -eq 6 ]]; then
              echo "ERROR: Static Web App failed to respond after 6 attempts"
              echo "   Status: $STATIC_STATUS"
              exit 1
            fi
            
            echo "Waiting 10 seconds before retry..."
            sleep 10
          done
          
          echo "SUCCESS: All applications deployment successful and healthy!"
      
      - name: Test webhook integration
        shell: bash
        run: |
          echo "TEST: Testing webhook integration..."
          
          # Send test webhook to mock client
          curl -X POST "http://localhost:5000/webhook" \
            -H "Content-Type: application/json" \
            -H "User-Agent: PropertyAlert-Test/1.0" \
            -d '{
              "test": "webhook", 
              "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'",
              "environment": "production",
              "source": "ci-cd-pipeline"
            }'
          
          # Verify webhook was received
          sleep 2
          WEBHOOK_COUNT=$(curl -s "http://localhost:5000/webhooks" | jq length 2>/dev/null || echo "0")
          if [ "$WEBHOOK_COUNT" -lt 1 ]; then
            echo "ERROR: Mock webhook client did not receive test webhook"
            exit 1
          fi
          
          echo "SUCCESS: Webhook integration test successful ($WEBHOOK_COUNT webhooks received)"
      
      - name: Stop Mock Webhook Client
        if: always()
        shell: bash
        run: |
          if [ -f webhook-client/webhook_client.pid ]; then
            kill $(cat webhook-client/webhook_client.pid) || true
            echo "STOPPED: Mock Webhook Client stopped"
          fi

  notify:
    runs-on: ubuntu-latest
    needs: [test-and-build, deploy-and-configure, test-and-notify]
    if: always()
    steps:
      - name: Summary
        shell: bash
        run: |
          FUNCTION_APP_NAME="${{ needs.deploy-and-configure.outputs.function-app-name }}"
          STATIC_WEB_APP_NAME="${{ needs.deploy-and-configure.outputs.static-web-app-name }}"
          
          if [[ "${{ needs.test-and-notify.result }}" == "success" ]]; then
            echo "SUCCESS: Deployment succeeded"
            echo "STARTED: Function App: https://$FUNCTION_APP_NAME.azurewebsites.net"
            echo "WEB: Static Web App: https://$STATIC_WEB_APP_NAME.azurestaticapps.net"
            echo "CONFIG: Configuration: 100% Azure-managed (no GitHub secrets for app config)"
            if [[ "${{ needs.test-and-build.outputs.infra-changed }}" == "true" ]]; then
              echo "INFRA: Infrastructure: Deployed (changes detected or forced)"
            else
              echo "INFRA: Infrastructure: Used existing resources"
            fi
            echo "TEST: Tests: All passed including webhook integration"
            echo "BUILD: SOLID Architecture: Enterprise-grade patterns implemented"
          else
            echo "ERROR: Deployment failed — check job logs"
            echo "STATUS: Pipeline status:"
            echo "   Test & Build: ${{ needs.test-and-build.result }}"
            echo "   Deploy & Configure: ${{ needs.deploy-and-configure.result }}"
            echo "   Test & Notify: ${{ needs.test-and-notify.result }}"
          fi
